<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="header-title">
        <span class="header-icon">▸</span> Progress Manager
      </h1>
      <div class="header-actions">
        <a href="https://kou-gin.github.io/todo-app/" class="link-todo" target="_blank" rel="noopener">→ Todo App</a>
        <button id="theme-toggle" class="btn-icon" aria-label="テーマ切替">
          <span class="theme-icon">◑</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <!-- フィルター・検索 -->
    <section class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="search-input" class="search-input" type="text" placeholder="タイトル・メモを検索..." />
      </div>
      <div class="filter-wrap">
        <button class="filter-btn active" data-status="all">すべて</button>
        <button class="filter-btn" data-status="active">
          <span class="badge badge--active">進行中</span>
        </button>
        <button class="filter-btn" data-status="done">
          <span class="badge badge--done">完了</span>
        </button>
        <button class="filter-btn" data-status="stopped">
          <span class="badge badge--stopped">停止</span>
        </button>
        <button class="filter-btn" data-status="pending">
          <span class="badge badge--pending">未着手</span>
        </button>
      </div>
    </section>

    <!-- 統計 -->
    <section class="stats" id="stats-bar">
      <span class="stat-item" id="stat-all">全 0</span>
      <span class="stat-sep">|</span>
      <span class="stat-item stat-active" id="stat-active">進行中 0</span>
      <span class="stat-sep">|</span>
      <span class="stat-item stat-done" id="stat-done">完了 0</span>
      <span class="stat-sep">|</span>
      <span class="stat-item stat-stopped" id="stat-stopped">停止 0</span>
      <span class="stat-sep">|</span>
      <span class="stat-item stat-pending" id="stat-pending">未着手 0</span>
    </section>

    <!-- プロジェクト一覧 -->
    <section class="projects-grid" id="projects-grid"></section>

    <!-- 追加ボタン -->
    <button class="fab" id="add-btn" aria-label="プロジェクト追加">+</button>
  </main>

  <!-- モーダル -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">新規プロジェクト</h2>
        <button class="btn-icon modal-close" id="modal-close" aria-label="閉じる">✕</button>
      </div>
      <form id="project-form" novalidate>
        <input type="hidden" id="project-id" />

        <div class="form-group">
          <label class="form-label" for="f-title">タイトル <span class="required">*</span></label>
          <input class="form-input" id="f-title" type="text" placeholder="プロジェクト名" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="f-status">ステータス</label>
          <div class="status-select-wrap">
            <select class="form-select" id="f-status">
              <option value="pending">未着手</option>
              <option value="active">進行中</option>
              <option value="done">完了</option>
              <option value="stopped">停止</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="f-progress">進捗状況</label>
          <input class="form-input" id="f-progress" type="text" placeholder="例: 設計フェーズ完了、実装50%" />
        </div>

        <div class="form-group">
          <label class="form-label" for="f-next">次のアクション</label>
          <input class="form-input" id="f-next" type="text" placeholder="例: APIエンドポイントの実装" />
        </div>

        <div class="form-group">
          <label class="form-label" for="f-memo">メモ</label>
          <textarea class="form-textarea" id="f-memo" rows="3" placeholder="補足・参考リンクなど"></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="form-cancel">キャンセル</button>
          <button type="submit" class="btn btn-primary" id="form-submit">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 削除確認ダイアログ -->
  <div class="modal-overlay" id="delete-overlay" role="dialog" aria-modal="true">
    <div class="modal modal--sm">
      <div class="modal-header">
        <h2 class="modal-title">削除の確認</h2>
      </div>
      <p class="delete-msg">このプロジェクトを削除しますか？この操作は元に戻せません。</p>
      <div class="form-actions">
        <button class="btn btn-ghost" id="delete-cancel">キャンセル</button>
        <button class="btn btn-danger" id="delete-confirm">削除する</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
